<!doctype html>
<html lang="en">

<head>
  <script src="/src/wink-bridge.js"></script>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style.css" />
  <title>Bộ LẠC Crush - Pure Match-3</title>
  <!-- Google Identity Services SDK -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // Global error visual logger for remote debugging
    window.addEventListener("error", function (e) {
      const errDiv = document.createElement("div");
      errDiv.style.position = "fixed";
      errDiv.style.top = "10px";
      errDiv.style.left = "10px";
      errDiv.style.right = "10px";
      errDiv.style.padding = "15px";
      errDiv.style.background = "#ffebee";
      errDiv.style.color = "#c62828";
      errDiv.style.border = "2px solid #ef9a9a";
      errDiv.style.borderRadius = "8px";
      errDiv.style.zIndex = "99999";
      errDiv.style.fontFamily = "monospace";
      errDiv.style.fontSize = "12px";
      errDiv.style.whiteSpace = "pre-wrap";
      errDiv.innerHTML =
        "<strong>[Global Error]</strong> " +
        e.message +
        "<br>at " +
        e.filename +
        ":" +
        e.lineno +
        ":" +
        e.colno +
        "<br><br><strong>Stack:</strong><br>" +
        (e.error ? e.error.stack : "No stack trace");
      document.body.appendChild(errDiv);
    });
    window.addEventListener("unhandledrejection", function (e) {
      const errDiv = document.createElement("div");
      errDiv.style.position = "fixed";
      errDiv.style.top = "10px";
      errDiv.style.left = "10px";
      errDiv.style.right = "10px";
      errDiv.style.padding = "15px";
      errDiv.style.background = "#ffebee";
      errDiv.style.color = "#c62828";
      errDiv.style.border = "2px solid #ef9a9a";
      errDiv.style.borderRadius = "8px";
      errDiv.style.zIndex = "99999";
      errDiv.style.fontFamily = "monospace";
      errDiv.style.fontSize = "12px";
      errDiv.style.whiteSpace = "pre-wrap";
      errDiv.innerHTML =
        "<strong>[Promise Rejection]</strong> " +
        (e.reason ? e.reason.message || e.reason : "Unknown reason") +
        "<br><br><strong>Stack:</strong><br>" +
        (e.reason && e.reason.stack ? e.reason.stack : "No stack trace");
      document.body.appendChild(errDiv);
    });
  </script>
</head>

<body>
  <div id="app">
    <!-- Fullscreen Button Overlay -->
    <button id="fullscreen-btn" class="game-overlay-btn" title="Phóng to / Thu nhỏ">
      <svg viewBox="0 0 24 24">
        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
      </svg>
    </button>

    <!-- User Profile Widget Overlay -->
    <div id="user-profile" class="user-profile-widget" style="display: none;">
      <img id="user-avatar" class="user-profile-avatar" src="" alt="Avatar" />
      <div class="user-profile-info">
        <span id="user-name" class="user-profile-name">Guest</span>
        <span id="user-status" class="user-profile-status">Google Connected</span>
        <span id="user-signout" class="user-profile-signout">Đăng xuất</span>
      </div>
    </div>

    <!-- Google Sign In Mock Modal -->
    <div id="google-login-modal" class="google-modal-overlay">
      <div class="google-modal-card">
        <svg class="google-logo-svg" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
        </svg>
        <h2 class="google-modal-title">Đăng nhập bằng Google</h2>
        <p class="google-modal-sub">để tiếp tục lưu điểm số kỷ lục của bạn</p>
        
        <div class="google-account-list">
          <!-- Account 1 -->
          <div class="google-account-item" data-account="laclac">
            <img class="google-account-avatar" src="/assets/imagebldp/001_avatar_laclac.png" alt="Lac Lac" />
            <div class="google-account-details">
              <span class="google-account-name">Lạc Lạc (Bơ Lạc)</span>
              <span class="google-account-email">laclac.bolac@gmail.com</span>
            </div>
          </div>
          <!-- Account 2 -->
          <div class="google-account-item" data-account="dauphong">
            <img class="google-account-avatar" src="/assets/imagebldp/015_avatar_dauLan.png" alt="Dau Phong" />
            <div class="google-account-details">
              <span class="google-account-name">Đậu Phộng</span>
              <span class="google-account-email">dauphong.bolac@gmail.com</span>
            </div>
          </div>
        </div>
        
        <!-- Real Google Sign In button container -->
        <div id="google-real-signin-btn" style="margin-bottom: 12px; display: flex; justify-content: center;"></div>
        
        <button id="google-modal-close-btn" class="google-modal-close">Hủy</button>
      </div>
    </div>

    <div id="pixi-container"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
